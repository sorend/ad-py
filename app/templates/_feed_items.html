{% for item in items %}
<div class="photo" data-href="{{ item.link }}">
  <div class="photo-image {{ item.type }}" style="background-image: url({{ item.thumb }})">
    <span class="photo-date">{{ item.year_month[:4] }} / {{ item.year_month[5:] }}</span>
  </div>
  <div class="photo-caption">{{ item.title }}</div>
</div>
{% else %}
<div id="loading">No items available yet.</div>
{% endfor %}
